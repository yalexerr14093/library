services:
  - type: web
    name: biblioteka-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        fromService:
          type: web
          name: biblioteka-frontend
          property: url
      - key: DATABASE_URL
        fromDatabase:
          name: biblioteka-postgres
          property: connectionString
      - key: DB_SSL
        value: "true"

  - type: web
    name: biblioteka-frontend
    env: static
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: VITE_API_URL
        fromService:
          type: web
          name: biblioteka-backend
          property: url

databases:
  - name: biblioteka-postgres
    plan: free

